<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>ORG Monthly Review</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" integrity="sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi" crossorigin="anonymous"></script>
<style>
:root { color-scheme: light; --bg:#f7f8fa; --card:#fff; --border:#e5e7eb; --text:#111827; --muted:#6b7280; --green:#16a34a; --green-bg:#dcfce7; --red:#dc2626; --red-bg:#fee2e2; --blue:#2563eb; --blue-light:#93c5fd; --blue-fc:#c7d2fe; --orange:#f97316; --orange-light:#fdba74; --accent:#1e3a8a; --neutral:#9ca3af; }
* { box-sizing: border-box; }
body { margin:0; font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',Roboto,sans-serif; color:var(--text); background:var(--bg); font-size:14px; line-height:1.5; }
.container { max-width:1400px; margin:0 auto; padding:24px; }
.header { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:20px 24px; margin-bottom:20px; }
.header h1 { margin:0 0 4px 0; font-size:22px; font-weight:700; }
.header .sub { color:var(--muted); font-size:13px; }
.toggles { display:flex; gap:24px; margin-top:16px; flex-wrap:wrap; align-items:center; }
.toggle-group { display:flex; align-items:center; gap:8px; }
.toggle-group .label { font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; font-weight:600; }
.toggle-btns { display:inline-flex; background:#f1f3f5; border-radius:8px; padding:3px; }
.toggle-btns button { border:0; background:transparent; padding:6px 14px; font-size:13px; font-weight:500; border-radius:6px; cursor:pointer; color:var(--muted); transition:all 0.15s; }
.toggle-btns button.active { background:var(--card); color:var(--text); box-shadow:0 1px 2px rgba(0,0,0,0.08); }
.toggle-btns.mini button { padding:4px 10px; font-size:12px; }
select.month-select, select.team-select { background:var(--card); border:1px solid var(--border); border-radius:6px; padding:6px 10px; font-size:13px; cursor:pointer; max-width:280px; }
.bu-tabs { display:flex; gap:4px; margin-bottom:16px; border-bottom:1px solid var(--border); }
.bu-tabs button { background:transparent; border:0; padding:12px 24px; font-size:14px; font-weight:600; color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; }
.bu-tabs button.active { color:var(--accent); border-bottom-color:var(--accent); }
.card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:20px 24px; margin-bottom:16px; }
.card h2 { margin:0 0 12px 0; font-size:16px; font-weight:600; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; }
.card h3 { margin:16px 0 8px 0; font-size:14px; font-weight:600; color:var(--text); }
.summary { display:flex; align-items:flex-start; gap:16px; margin-bottom:12px; }
.summary-status { font-size:28px; line-height:1; }
.summary-headline { font-size:18px; font-weight:600; margin-bottom:4px; }
.summary-takeaway { color:var(--text); line-height:1.55; }
.drivers { margin-top:10px; padding-top:10px; border-top:1px dashed var(--border); display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.driver { padding:8px 10px; border-radius:6px; background:#f9fafb; }
.driver-label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; font-weight:600; margin-bottom:2px; }
.driver-name { font-weight:600; }
.driver-num { font-size:13px; }
.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.grid-2 > .card { margin-bottom:0; }
.chart-wrap { position:relative; height:320px; }
table { width:100%; border-collapse:collapse; font-size:13px; }
table th { text-align:right; font-weight:600; padding:8px 12px; border-bottom:2px solid var(--border); background:#f9fafb; color:var(--muted); text-transform:uppercase; font-size:11px; letter-spacing:0.5px; }
table th:first-child { text-align:left; }
table td { padding:6px 12px; border-bottom:1px solid #f3f4f6; text-align:right; }
table td:first-child { text-align:left; }
table tr.parent td { font-weight:700; background:#f9fafb; }
table tr.subparent td { font-weight:600; color:var(--accent); }
table tr.indent td:first-child { padding-left:24px; color:var(--muted); }
table tr.indent2 td:first-child { padding-left:40px; color:var(--muted); font-size:12px; }
.var-pos { color:var(--red); }
.var-neg { color:var(--green); }
.var-pct-pos { color:var(--red); font-weight:600; }
.var-pct-neg { color:var(--green); font-weight:600; }
tr.sig-row td { font-weight:600; }
tr.sig-row.sig-pos td:nth-child(4), tr.sig-row.sig-pos td:nth-child(5) { background:#fef2f2; }
tr.sig-row.sig-neg td:nth-child(4), tr.sig-row.sig-neg td:nth-child(5) { background:#f0fdf4; }
.commentary { margin-top:12px; padding:14px 16px; background:#f9fafb; border-left:3px solid var(--accent); border-radius:4px; font-size:13px; }
.commentary h3 { margin-top:0; }
.commentary .line { display:block; padding:4px 0; }
.line-icon { display:inline-block; margin-right:4px; }
.line-name { font-weight:600; }
.line-vals { color:var(--muted); }
.line-ctx { display:block; padding:2px 0 6px 24px; color:var(--text); font-size:12.5px; }
.insight { display:block; padding:4px 0 8px 24px; color:#1e3a8a; font-size:12.5px; font-style:italic; border-left:2px solid #c7d2fe; margin-left:8px; padding-left:10px; }
.subsection-head { display:flex; justify-content:space-between; align-items:center; margin:4px 0 10px; flex-wrap:wrap; gap:8px; }
.subsection-head h3 { margin:0; }
.subsection-head .meta { font-size:12px; color:var(--muted); }
.kpi-row { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; padding:12px 0; border-top:1px solid var(--border); margin-top:16px; }
.kpi { padding:6px 0; }
.kpi .label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; font-weight:600; }
.kpi .value { font-size:20px; font-weight:700; margin-top:2px; }
.kpi .change { font-size:12px; font-weight:600; margin-top:1px; }
.questions { background:#fef3c7; border-left:3px solid #f59e0b; padding:14px 16px; border-radius:4px; }
.questions h3 { margin:0 0 8px 0; color:#92400e; }
.questions li { margin:4px 0; }
.split-block { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
.split-block .card { margin-bottom:0; }
.muted { color:var(--muted); }
.small { font-size:12px; }
.tag { display:inline-block; padding:2px 8px; background:#e0e7ff; color:var(--accent); border-radius:10px; font-size:11px; font-weight:600; margin-left:8px; }
.print-button { background:var(--accent); color:white; border:0; padding:8px 16px; border-radius:6px; font-size:13px; font-weight:600; cursor:pointer; }
.cat-icon { display:inline-block; margin-left:6px; cursor:help; color:#f59e0b; font-size:11px; font-weight:700; background:#fef3c7; border-radius:50%; width:14px; height:14px; line-height:14px; text-align:center; vertical-align:middle; }
.cat-footnote { margin-top:12px; padding:10px 12px; background:#fffbeb; border-left:3px solid #f59e0b; border-radius:4px; font-size:12px; color:#78350f; }
.cat-footnote ul { margin:4px 0 0 0; padding-left:18px; }
.cat-footnote li { margin:2px 0; }
.team-mention { display:inline-block; margin-left:6px; padding:1px 7px; background:#e0e7ff; color:var(--accent); border-radius:8px; font-size:11px; font-weight:600; }
.team-filter-row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:10px; padding-bottom:10px; border-bottom:1px solid var(--border); }
.team-filter-row .label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; font-weight:600; }
@media print { body { background:white; } .toggles, .bu-tabs, .print-button { display:none; } .card { box-shadow:none; border:1px solid #ddd; } }
</style>
</head>

<div class="container">
  <div class="header">
    <h1>ORG Monthly Review <span class="tag" id="period-tag">YTD</span></h1>

        <span class="label">Compare vs</span>

          <button data-val="BGT" class="active">BGT</button>
          <button data-val="FC">FC04</button>
        </div>
      </div>
      <button class="print-button" onclick="window.print()" style="margin-left:auto">Print / Save as PDF</button>
    </div>
  </div>
  <div class="bu-tabs" id="bu-tabs">
    <button data-bu="Takeaway" class="active">Takeaway</button>
    <button data-bu="Food">Food</button>
    <button data-bu="Delivery">Delivery</button>
    <button data-bu="Grocery">Grocery</button>
  </div>
  <div id="bu-content"></div>
</div>

//       monthly → stored FBR column (e.g., col Y for Apr) — that's the row's stored Apr FBR.
//       YTD/FY → we compute blended rate = total$ ÷ (HC_avg × n_months), since the
//                stored YTD FBR is a sum-of-monthly-FBRs and not a true blended rate.

             volume:(fte.volume??0)+(q.volume??0), rateBars:[...rateMap.values()],
             HC_act:null, HC_cmp:null, dHC:null, isTotal:true,
             fteHC:fte.HC_act, fteHCcmp:fte.HC_cmp, qHC:q.HC_act, qHCcmp:q.HC_cmp };
  }
  const HC_act = getHC(bu,"Actual",block,period);
  const HC_cmp = getHC(bu,state.compare,block,period);
  let volBar = 0, volFound = false;
  const rateBars = [];
  for (const line of lines) {
    if (line === "Third-party Labor Cost (Excl. Customer Service)") {
      if (block === "FTE") {
        for (const [sub,ht] of [["Contracted Labor-Didi Paid","Intern"],["Contracted Labor-Third-party Paid","Outsourced"]]) {
          const dA = getVal(bu,"Actual","FTE",sub,"dollar",period);
          const dC = getVal(bu,state.compare,"FTE",sub,"dollar",period);
          const hcA = ht==="Intern"?getInternHC(bu,"Actual",period):getOutsourcedHC(bu,"Actual",period);
          const hcC = ht==="Intern"?getInternHC(bu,state.compare,period):getOutsourcedHC(bu,state.compare,period);
          const d = decompose(dA,dC,hcA,hcC);
          if (d) { volBar += d.vol; volFound = true; rateBars.push({label:sub.replace("Contracted Labor-","CL: "), rate:d.rate, fbrA:hcA?dA/hcA:null, fbrC:hcC?dC/hcC:null}); }
        }
      } else {
        const dA = getVal(bu,"Actual","Quasi",line,"dollar",period);
        const dC = getVal(bu,state.compare,"Quasi",line,"dollar",period);
        const hcA = getInternHC(bu,"Actual",period); const hcC = getInternHC(bu,state.compare,period);
        const d = decompose(dA,dC,hcA,hcC);
        if (d) { volBar += d.vol; volFound = true; rateBars.push({label:line, rate:d.rate, fbrA:hcA?dA/hcA:null, fbrC:hcC?dC/hcC:null}); }
      }
      continue;
    }
    const dA = getVal(bu,"Actual",block,line,"dollar",period);
    const dC = getVal(bu,state.compare,block,line,"dollar",period);
    const d = decompose(dA,dC,HC_act,HC_cmp);
    if (d) { volBar += d.vol; volFound = true; rateBars.push({label:line, rate:d.rate, fbrA:HC_act?dA/HC_act:null, fbrC:HC_cmp?dC/HC_cmp:null}); }
  }
  return { parentBGT:getVal(bu,state.compare,block,parent,"dollar",period)??0, parentACT:getVal(bu,"Actual",block,parent,"dollar",period)??0,
           volume:volFound?volBar:null, rateBars, HC_act, HC_cmp, dHC:(HC_act!=null&&HC_cmp!=null)?HC_act-HC_cmp:null };
}

// === Waterfall SVG renderer ===
function rateColor(v) { const sig = Math.abs(v) >= SIG_THRESHOLD; if (v<0) return sig?"#16a34a":"#bbf7d0"; return sig?"#dc2626":"#fecaca"; }
function renderWaterfall(container, wf, parentLabel) {
  if (!container) return;
  container.innerHTML = "";
  const rateLabels = wf.rateBars.map(b=>b.label);
  const rateValues = wf.rateBars.map(b=>b.rate);
  const labels = [`${state.compare} ${parentLabel}`, "HC Volume", ...rateLabels, `Actual ${parentLabel}`];
  const values = [wf.parentBGT, wf.volume??0, ...rateValues, wf.parentACT];
  const types = ["start","volume",...rateLabels.map(()=>"rate"),"end"];
  // Path levels for dynamic Y scale
  const pathLevels = [wf.parentBGT, wf.parentACT];
  let cum = wf.parentBGT;
  for (let i=1;i<types.length-1;i++) { cum += values[i]; pathLevels.push(cum); }
  let maxV = Math.max(...pathLevels), minV = Math.min(...pathLevels);
  const range = (maxV-minV) || Math.max(1, Math.abs(maxV))*0.1;
  const padBelow = Math.max(range*0.6, Math.abs(maxV)*0.05);
  const padAbove = range*0.30;
  minV -= padBelow; maxV += padAbove;
  if (minV<0 && Math.min(...pathLevels) >= 0) minV = 0;
  const span = (maxV-minV) || 1;
  // Build runs: start/end anchored to chart bottom (minV); middle deltas float at cumulative
  const runs = [];
  let cumPath = wf.parentBGT;
  for (let i=0;i<types.length;i++) {
    if (types[i] === "start" || types[i] === "end") runs.push([minV, values[i]]);
    else { const prev = cumPath; cumPath += values[i]; runs.push([Math.min(prev,cumPath), Math.max(prev,cumPath)]); }
  }
  const w = container.clientWidth || 900, n = types.length;
  const margin = {l:70, r:30, t:26, b:150}; const innerH = 380; const h = margin.t+margin.b+innerH;
  const innerW = w - margin.l - margin.r;
  const barW = Math.min(72, (innerW-20)/n - 8);
  const gap = (innerW - n*barW)/(n+1);
  const yFor = v => margin.t + innerH - ((v-minV)/span)*innerH;
  let g = `<svg width="100%" viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMinYMin meet" xmlns="http://www.w3.org/2000/svg">`;
  const netVar = (wf.parentACT??0) - (wf.parentBGT??0);
  const netColor = netVar<0?"#16a34a":(netVar>0?"#dc2626":"#374151");
  g += `<text x="${margin.l}" y="16" font-size="12" font-weight="600" fill="#111827">Saving/Loss vs ${esc(state.compare)}: <tspan fill="${netColor}">${netVar>=0?"+":""}${netVar.toFixed(1)}k</tspan> (${esc(state.compare)} ${wf.parentBGT.toFixed(1)}k → Actual ${wf.parentACT.toFixed(1)}k)</text>`;
  for (let k=0;k<=4;k++) { const v = minV + span*k/4; const y = yFor(v); g += `<line x1="${margin.l}" y1="${y}" x2="${w-margin.r}" y2="${y}" stroke="#f3f4f6"/>`; g += `<text x="${margin.l-6}" y="${y+3}" text-anchor="end" font-size="10" fill="#9ca3af">${v.toFixed(0)}</text>`; }
  if (0>minV && 0<maxV) g += `<line x1="${margin.l}" y1="${yFor(0)}" x2="${w-margin.r}" y2="${yFor(0)}" stroke="#9ca3af" stroke-dasharray="2,2"/>`;
  g += `<line x1="${margin.l}" y1="${yFor(wf.parentBGT)}" x2="${w-margin.r}" y2="${yFor(wf.parentBGT)}" stroke="#cbd5e1" stroke-dasharray="3,3"/>`;
  g += `<line x1="${margin.l}" y1="${yFor(wf.parentACT)}" x2="${w-margin.r}" y2="${yFor(wf.parentACT)}" stroke="#cbd5e1" stroke-dasharray="3,3"/>`;
  for (let i=0;i<n;i++) {
    const x = margin.l + gap + i*(barW+gap);
    const [s,e] = runs[i];
    const yTop = yFor(Math.max(s,e)), yBot = yFor(Math.min(s,e));
    const bh = Math.max(2, yBot-yTop);
    let color;
    if (types[i]==="start") color = "#94a3b8";
    else if (types[i]==="end") color = "#475569";
    else if (types[i]==="volume") color = Math.abs(values[i])>=SIG_THRESHOLD ? "#2563eb" : "#bfdbfe";
    else color = rateColor(values[i]);
    g += `<rect x="${x}" y="${yTop}" width="${barW}" height="${bh}" fill="${color}" rx="3"/>`;
    if (i>0 && i<n-1 && types[i]!=="end" && types[i-1]!=="end") {
      let prevTopY; if (types[i-1]==="start") prevTopY = yFor(wf.parentBGT); else prevTopY = yFor(runs[i-1][1]);
      const prevX = margin.l + gap + (i-1)*(barW+gap) + barW;
      g += `<line x1="${prevX}" y1="${prevTopY}" x2="${x}" y2="${prevTopY}" stroke="#d1d5db" stroke-dasharray="2,2"/>`;
    }
    if (types[i]==="end" && i>0) { const prevTopY = yFor(runs[i-1][1]); const prevX = margin.l + gap + (i-1)*(barW+gap) + barW; g += `<line x1="${prevX}" y1="${prevTopY}" x2="${x}" y2="${prevTopY}" stroke="#d1d5db" stroke-dasharray="2,2"/>`; }
    if (types[i]==="start" || types[i]==="end") {
      g += `<text x="${x+barW/2}" y="${yTop-4}" text-anchor="middle" font-size="11" font-weight="700" fill="#111827">${values[i].toFixed(1)}</text>`;
    } else {
      const valStr = (values[i]>=0?"+":"") + values[i].toFixed(1);
      const labelY = values[i]>=0 ? yTop-4 : yBot+12;
      const labelColor = (types[i]==="rate" && Math.abs(values[i])>=SIG_THRESHOLD) ? color : "#111827";
      g += `<text x="${x+barW/2}" y="${labelY}" text-anchor="middle" font-size="11" font-weight="700" fill="${labelColor}">${valStr}</text>`;
    }
    const lbl = labels[i]; const truncated = lbl.length>26 ? lbl.slice(0,24)+"…" : lbl;
    const labelX = x+barW/2;
    g += `<text x="${labelX}" y="${h-margin.b+14}" text-anchor="end" font-size="10" fill="#374151" transform="rotate(-40 ${labelX} ${h-margin.b+14})">${esc(truncated)}</text>`;
  }
  g += `</svg>`;
  container.innerHTML = g;
}

// === Commentary ===
function generateCommentary(wf, block) {
  const items = [];
  if (wf.volume != null && Math.abs(wf.volume) >= 5) {
    const icon = wf.volume<0 ? "🟢" : "🔴";
    let ctx;
    if (wf.isTotal) {
      const fteD = (wf.fteHC??0) - (wf.fteHCcmp??0); const qD = (wf.qHC??0) - (wf.qHCcmp??0);
      ctx = `D-Levels ${wf.fteHC??'—'} vs ${wf.fteHCcmp??'—'} (${fteD>=0?'+':''}${fteD}); Subsidiary HC ${wf.qHC??'—'} vs ${wf.qHCcmp??'—'} (${qD>=0?'+':''}${qD}).`;
    } else {
      const dStr = wf.dHC!=null ? `${wf.dHC>=0?'+':''}${wf.dHC.toFixed(1)} HC` : "";
      ctx = `${dStr} (${block==='FTE'?'D-Levels':'Subsidiary HC'}: ${wf.HC_act} vs ${wf.HC_cmp}).`;
    }
    const insight = wf.volume>=0 ? "Volume overspend — more HC than planned. Investigate hiring cadence." : "Volume saving — HC leaner than BGT. Lapse-driven; sustainable if hiring stays on plan.";
    items.push({icon, name:"HC Volume", val:fmtSigned(wf.volume)+"k", ctx, insight, abs:Math.abs(wf.volume)});
  }
  for (const b of wf.rateBars) {
    if (Math.abs(b.rate) < 10) continue;
    const icon = b.rate<0 ? "🟢" : "🔴";
    let fbrLine = "";
    if (b.fbrC != null && b.fbrA != null) { const pct = (b.fbrA/b.fbrC-1)*100; fbrLine = `FBR ${b.fbrC.toFixed(2)} → ${b.fbrA.toFixed(2)} (${pct>=0?'+':''}${pct.toFixed(1)}%)`; }
    const insight = buildInsight(b.label, block, b.rate);
    items.push({icon, name:b.label, val:fmtSigned(b.rate)+"k", ctx:fbrLine, insight, abs:Math.abs(b.rate)});
  }
  items.sort((a,b)=>b.abs-a.abs);
  if (!items.length) return `<p class="muted small">No line item exceeds the threshold for commentary at this period/comparison.</p>`;
  let html = "";
  for (const it of items.slice(0,8)) {
    const lineForTeam = it.name.startsWith("CL: ") ? (it.name==="CL: Didi Paid"?"Contracted Labor-Didi Paid":"Contracted Labor-Third-party Paid") : it.name;
    let mention = "";
    if (Math.abs(parseFloat(it.val)) >= SIG_THRESHOLD) {
      // Direction-aware: BU overspend → top positive contributor; BU saving → top negative contributor
      const varSign = parseFloat(it.val) >= 0 ? 1 : -1;
      const top = findTopTeamForLine(state.bu, lineForTeam, varSign);
      if (top && Math.abs(top.v) >= 1000) {
        const label = varSign > 0 ? "Top overspend team" : "Top savings team";
        mention = `<span class="team-mention" title="Largest contributing team in the direction of the variance (Mgmt Report ledger)">${label}: ${esc(top.name)} (${(top.v/1000).toFixed(0)}k YTD)</span>`;
      }
    }
    html += `<span class="line"><span class="line-icon">${it.icon}</span><span class="line-name">${it.name}:</span> <span class="line-vals">${it.val}</span>${mention}</span>`;
    if (it.ctx) html += `<span class="line-ctx">${it.ctx}</span>`;
    if (it.insight) html += `<span class="insight">${it.insight}</span>`;
  }
  return html;
}

function makeExecSummary(bu, period) {
  const fteVar = varDollar(bu,"FTE","Org Expense Total (incl. allocation)",period);
  const quasiVar = varDollar(bu,"Quasi","Org Expense Total (incl. allocation)",period);
  const totalVar = (fteVar??0)+(quasiVar??0);
  const stat = status(totalVar);
  const label = stat==="🟢" ? "Favorable" : (stat==="🔴" ? "Unfavorable" : "Flat");
  const periodLabel = period==="YTD" ? "YTD" : (period==="FY" ? "FY" : period);
  const drivers = [];
  for (const block of ["FTE","Quasi"]) {
    for (const line of [...DATA.comp_lines, ...DATA.ole_lines]) {
      if (line === "Third-party Labor Cost (Excl. Customer Service)" && block === "FTE") {
        for (const sub of ["Contracted Labor-Didi Paid","Contracted Labor-Third-party Paid"]) {
          const v = varDollar(bu,"FTE",sub,period);
          if (v != null) drivers.push({line: sub.replace("Contracted Labor-","CL: "), block, v});
        }
        continue;
      }
      const v = varDollar(bu,block,line,period);
      if (v != null) drivers.push({line, block, v});
    }
  }
  drivers.sort((a,b) => Math.abs(b.v) - Math.abs(a.v));
  const top2 = drivers.slice(0,2);
  const takeaway = `${bu} ${periodLabel} Org Expense ran ${stat==="🟢"?"under":(stat==="🔴"?"over":"flat to")} ${state.compare} by ${fmt(Math.abs(totalVar))}k.`;
  return {stat, label, totalVar, takeaway, top2, periodLabel};
}

// Open questions — only surface questions the commentary doesn't already answer.
const COVERED_LINES = new Set(Object.keys(INSIGHTS));
function generateQuestions(bu, period) {
  const out = [];
  // (1) HC volume gaps — material delta on D-Levels or Subsidiary HC
  for (const block of ["FTE","Quasi"]) {
    const hcLine = block==="FTE" ? "D Levels" : "Subsidiary HC";
    const hcA = getHC(bu,"Actual",block,period);
    const hcC = getHC(bu,state.compare,block,period);
    if (hcA!=null && hcC!=null && Math.abs(hcA-hcC)>=5) {
      const d = hcA-hcC; const dir = d>0?"above":"below";
      out.push(`${hcLine} (${block}) running ${dir} ${state.compare} by ${Math.abs(d).toFixed(1)} HC (${hcA} vs ${hcC}) — confirm hiring cadence and which teams are over/under plan.`);
    }
  }
  for (const [hcLine,getter] of [["Intern-HC",getInternHC],["Outsourced HC",getOutsourcedHC]]) {
    const hcA = getter(bu,"Actual",period); const hcC = getter(bu,state.compare,period);
    if (hcA!=null && hcC!=null && Math.abs(hcA-hcC)>=3) {
      const d = hcA-hcC; const dir = d>0?"above":"below";
      out.push(`${hcLine} running ${dir} ${state.compare} by ${Math.abs(d).toFixed(1)} HC (${hcA} vs ${hcC}) — confirm with staffing owner.`);
    }
  }
  // (2) Severance Fee — always surface non-trivial movement
  for (const block of ["FTE","Quasi"]) {
    const v = varDollar(bu, block, "Severance Fee", period);
    if (v != null && Math.abs(v) >= 10) {
      const a = getVal(bu,"Actual",block,"Severance Fee","dollar",period) || 0;
      const c = getVal(bu,state.compare,block,"Severance Fee","dollar",period) || 0;
      const dir = v>0 ? "overspend" : "saving";
      out.push(`Severance Fee (${block}): ${dir} of ${Math.abs(v).toFixed(0)}k (Actual ${a.toFixed(0)}k vs ${state.compare} ${c.toFixed(0)}k) — which roles? Was the termination planned?`);
    }
  }
  // (3) Headhunting Fee spike — needs specific hire context
  for (const block of ["FTE","Quasi"]) {
    const v = varDollar(bu, block, "Recruitment Fee-Headhunting Fee", period);
    if (v != null && v >= 20) {
      out.push(`Headhunting Fee (${block}): spike of +${v.toFixed(0)}k vs ${state.compare} — which senior / D-level hires drove this?`);
    }
  }
  // (4) Material variance on a line WITHOUT insights coverage — truly unmapped
  for (const block of ["FTE","Quasi"]) {
    for (const line of [...DATA.comp_lines, ...DATA.ole_lines]) {
      if (COVERED_LINES.has(line)) continue;
      const v = varDollar(bu, block, line, period);
      if (v != null && Math.abs(v) >= 100) {
        const dir = v>0 ? "overspend" : "saving";
        out.push(`${line} (${block}): ${dir} of ${Math.abs(v).toFixed(0)}k — no standing context for this line; please confirm driver.`);
      }
    }
  }
  return out;
}

function renderHCChart(canvas, bu, hcLine) {
  if (!canvas) return;
  if (canvas._chart) canvas._chart.destroy();
  const months = MONTHS;
  const block = hcLine==="D Levels" ? "FTE" : "Quasi";
  const teamFilter = state.hcTeam[bu];
  const isTeamFiltered = teamFilter && teamFilter !== "__all__";
  let actData, cmpData;
  let actLabel, cmpLabel;
  if (isTeamFiltered) {
    // Team's own Actuals+FC05 series + Team's own BGT/FC line
    actData = months.map(m => getTeamHC(bu, teamFilter, m, hcLine, "Actual"));
    actData.push(getTeamHC(bu, teamFilter, "YTD", hcLine, "Actual"));
    actData.push(getTeamHC(bu, teamFilter, "FY", hcLine, "Actual"));
    cmpData = months.map(m => getTeamHC(bu, teamFilter, m, hcLine, state.compare));
    cmpData.push(getTeamHC(bu, teamFilter, "YTD", hcLine, state.compare));
    cmpData.push(getTeamHC(bu, teamFilter, "FY", hcLine, state.compare));
    actLabel = `${teamFilter} Actuals+FC05`;
    cmpLabel = `${teamFilter} ${state.compare}`;
  } else {
    actData = months.map(m => getHC(bu, "Actual", block, m));
    actData.push(getHC(bu, "Actual", block, "YTD"));
    actData.push(getHC(bu, "Actual", block, "FY"));
    cmpData = months.map(m => getHC(bu, state.compare, block, m));
    cmpData.push(getHC(bu, state.compare, block, "YTD"));
    cmpData.push(getHC(bu, state.compare, block, "FY"));
    actLabel = "Actuals+FC05";
    cmpLabel = `${state.compare}`;
  }
  const labels = [...months, "YTD", "FY"];
  // Colors: Jan-Apr darker; May-Dec lighter; YTD/FY orange tones
  const actColors = labels.map((_,i) => i>=12 ? "#fdba74" : (i<=CURRENT_ACTUAL_MONTH_IDX ? "#2563eb" : "#93c5fd"));
  const cmpColors = labels.map((_,i) => i>=12 ? "#f97316" : "#1e3a8a");
  const titleSuffix = isTeamFiltered ? ` — ${teamFilter} vs ${bu} BU ${state.compare}` : " (Jan-Apr darker = Actual, May-Dec lighter = FC05)";
  canvas._chart = new Chart(canvas.getContext("2d"), {
    type:"bar",
    data:{labels, datasets:[
      {label:actLabel, data:actData, backgroundColor:actColors, borderWidth:0},
      {label:cmpLabel, data:cmpData, backgroundColor:cmpColors, borderWidth:0}
    ]},
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{position:"top", labels:{boxWidth:12, font:{size:11}}},
        title:{display:true, text:`${hcLine} — ${bu}${titleSuffix}`, font:{size:12, weight:600}}
      },
      scales:{
        y: (()=>{ const all = [...actData,...cmpData].filter(v=>v!=null); if (!all.length) return {beginAtZero:true}; const lo=Math.min(...all), hi=Math.max(...all); const span=(hi-lo)||hi*0.1; return {beginAtZero:false, suggestedMin:Math.max(0,lo-span*0.5), suggestedMax:hi+span*0.20, ticks:{font:{size:10}}}; })(),
        x:{ticks:{font:{size:10}}}
      }
    }
  });
}

// === Variance Analysis Table — FTE / Quasi split, sourced from SSL Excel (matches Overview) ===
function renderVarianceTable(container, bu, block, period, view) {
  const lines = DATA.overview_lines_fte;
  const html = [];
  if (view === "FBR") {
    html.push(`<table><thead><tr><th>Line Item</th><th>Actual FBR</th><th>${state.compare} FBR</th><th>VAR</th><th>VAR %</th></tr></thead><tbody>`);
  } else {
    html.push(`<table><thead><tr><th>Line Item</th><th>Actual $</th><th>${state.compare} $</th><th>VAR</th><th>VAR %</th></tr></thead><tbody>`);
  }
  const parentLines = new Set(["Org Expense Total (incl. allocation)","Org Expense Total (excl. allocation)","Org Expense FBR (exlc. allocation)","Comp & Benefits","Other Labor Exp","Comp & Benefits FBR","Other Employee Fee FBR"]);
  const subParentLines = new Set(["Third-party Labor Cost (Excl. Customer Service)","Culture Exp","Recruitment Fee","Administrative Workplace Fee","IT Worklace fee","Bonus","General Exp **","Administrative Exp","IT Exp","Allocation","Benefit Exp"]);
  const indent2Lines = new Set(["Contracted Labor-Didi Paid","Contracted Labor-Third-party Paid","Performance Commissions","Annual Bonus","Others Compensation","Sales Bonus","Culture-Rewards Burn","Culture-Company Culture & Others","Recruitment Fee-Headhunting Fee","Recruitment Fee-Others","Recruitment Fee-Campus Recruitment","Recruitment Fee-Recruitment Platform","Recruitment Fee-Internal recommendation Reward","Recruitment Fee-Offsite Recruitment","Travel Exp","Meeting","Team Building","Business Hospitality/Entertainment","Telecomunication","Transportation","Administrative Welfare","IBG Internal Administrative Workplace Fee","HQ Administrative Workplace Fee","IBG Internal IT Worklace fee","HQ IT IT Worklace fee","Communication & IT Exp-Telephone & Broadband","Communication & IT Exp-Hardware Maintenance","Depreciation Exp - IT","Communication & IT Exp-PC & Accessories","Communication & IT Exp-Professional SW & Licences","Direct Service Charge – HQ HC Related Exp","Direct Service Charge – CTO HC Related Exp","Direct Service Charge – Ride-hailing HC Related Exp","C&B-Intl Business Internal Allocation","Other Directly Support Orginization Fee","Property & Equipment Maintenance Fee-Rental / Property Management","Contracted Property Management (Security & Cleaning)","Utilities & Maintenance","Office Supply","Stationary","Low-value Consumables","Depreciation and Amortization","EEC Service Allocation"]);

  for (const line of lines) {

    const dVar = (dA!=null && dC!=null) ? dA-dC : null;
    const isSig = dVar!=null && Math.abs(dVar)>=SIG_THRESHOLD;
    let a, c, fmtFn;
    if (view === "FBR") {
      a = getFbr(bu, "Actual", block, line, period);
      c = getFbr(bu, state.compare, block, line, period);
      fmtFn = v => v==null ? "—" : v.toFixed(2);
    } else {
      a = dA; c = dC;
      fmtFn = v => v==null ? "—" : v.toLocaleString(undefined,{maximumFractionDigits:1});
    }
    if (a==null && c==null) continue;
    const v = (a!=null && c!=null) ? a-c : null;
    const pct = (a!=null && c!=null && c!==0) ? (a/c)-1 : null;
    let cls = "indent";
    if (parentLines.has(line)) cls = "parent";
    else if (subParentLines.has(line)) cls = "subparent";

    if (isSig) cls += " sig-row" + (dVar>0?" sig-pos":" sig-neg");
    const vClass = v==null ? "" : (v>0?"var-pos":"var-neg");
    const pClass = pct==null ? "" : (pct>0?"var-pct-pos":"var-pct-neg");
    const catKey = `${bu}||${block}||${line}`;
    const hasNote = CAT_FOOTNOTES[catKey];
    const noteIcon = hasNote ? `<span class="cat-icon" title="${esc(hasNote)}">i</span>` : "";
    html.push(`<tr class="${cls}"><td>${line}${noteIcon}</td><td>${fmtFn(a)}</td><td>${fmtFn(c)}</td><td class="${vClass}">${v==null?"—":(v>=0?"+":"")+fmtFn(v)}</td><td class="${pClass}">${pct==null?"—":(pct>=0?"+":"")+(pct*100).toFixed(1)+"%"}</td></tr>`);
  }
  html.push("</tbody></table>");
  const noteLines = [];
  for (const line of lines) { const key = `${bu}||${block}||${line}`; if (CAT_FOOTNOTES[key]) noteLines.push(`<li><strong>${line}:</strong> ${CAT_FOOTNOTES[key]}</li>`); }
  if (noteLines.length) html.push(`<div class="cat-footnote"><strong>i</strong> Categorization differences vs source GL ledger (Mgmt Report YTD):<ul>${noteLines.join("")}</ul></div>`);
  container.innerHTML = html.join("");
}

// === Render BU page ===
function renderBU() {
  const bu = state.bu, period = state.period;
  const exec = makeExecSummary(bu, period);
  const HC_act_fte = getHC(bu,"Actual","FTE",period), HC_cmp_fte = getHC(bu,state.compare,"FTE",period);
  const HC_act_q = getHC(bu,"Actual","Quasi",period), HC_cmp_q = getHC(bu,state.compare,"Quasi",period);
  const fteAct = getVal(bu,"Actual","FTE","Org Expense Total (incl. allocation)","dollar",period);
  const fteCmp = getVal(bu,state.compare,"FTE","Org Expense Total (incl. allocation)","dollar",period);
  const qAct = getVal(bu,"Actual","Quasi","Org Expense Total (incl. allocation)","dollar",period);
  const qCmp = getVal(bu,state.compare,"Quasi","Org Expense Total (incl. allocation)","dollar",period);
  const wfBlk = state.wfBlock;
  const tblView = state.tableView[bu];
  const hcTeam = state.hcTeam[bu];

  document.getElementById("period-tag").textContent = exec.periodLabel + " · vs " + state.compare;

  const driversHTML = exec.top2.map((d,i) => `
    <div class="driver">
      <div class="driver-label">Driver #${i+1}</div>
      <div class="driver-name">${d.line} <span class="muted small">(${d.block})</span></div>
      <div class="driver-num ${d.v>=0?'var-pos':'var-neg'}">${d.v>=0?'+':''}${d.v.toFixed(1)}k ${d.v<0?'(saving)':'(overspend)'}</div>
    </div>`).join("");

  // HC team filter dropdown
  const hcTeams = teamsForHC(bu);
  const hcTeamOptions = `<option value="__all__"${hcTeam==='__all__'?' selected':''}>All Teams</option>` + hcTeams.map(t=>`<option value="${esc(t)}"${hcTeam===t?' selected':''}>${esc(t)}</option>`).join("");

  const html = `
    <div class="card">
      <div class="summary">
        <div class="summary-status">${exec.stat}</div>
        <div style="flex:1">
          <div class="summary-headline">${exec.label} · ${exec.totalVar>=0?'+':''}${exec.totalVar.toFixed(1)}k vs ${state.compare} · ${exec.periodLabel}</div>
          <div class="summary-takeaway">${exec.takeaway}</div>
          <div class="drivers">${driversHTML}</div>
        </div>
      </div>
      <div class="kpi-row">
        <div class="kpi"><div class="label">D-Levels HC (FTE)</div><div class="value">${HC_act_fte??"—"}</div><div class="change ${(HC_act_fte??0)>(HC_cmp_fte??0)?'var-pos':'var-neg'}">${HC_cmp_fte!=null?`vs ${state.compare}: ${HC_cmp_fte} (${HC_act_fte-HC_cmp_fte>=0?'+':''}${(HC_act_fte-HC_cmp_fte).toFixed(1)})`:""}</div></div>
        <div class="kpi"><div class="label">Subsidiary HC (Quasi)</div><div class="value">${HC_act_q??"—"}</div><div class="change ${(HC_act_q??0)>(HC_cmp_q??0)?'var-pos':'var-neg'}">${HC_cmp_q!=null?`vs ${state.compare}: ${HC_cmp_q} (${HC_act_q-HC_cmp_q>=0?'+':''}${(HC_act_q-HC_cmp_q).toFixed(1)})`:""}</div></div>
        <div class="kpi"><div class="label">FTE Org Expense Total</div><div class="value">${fteAct==null?"—":fteAct.toFixed(0)+"k"}</div><div class="change ${fteAct>fteCmp?'var-pos':'var-neg'}">${fteCmp!=null?`vs ${state.compare}: ${fteCmp.toFixed(0)}k (${fteAct-fteCmp>=0?'+':''}${(fteAct-fteCmp).toFixed(0)}k)`:""}</div></div>
        <div class="kpi"><div class="label">Quasi Org Expense Total</div><div class="value">${qAct==null?"—":qAct.toFixed(0)+"k"}</div><div class="change ${qAct>qCmp?'var-pos':'var-neg'}">${qCmp!=null?`vs ${state.compare}: ${qCmp.toFixed(0)}k (${qAct-qCmp>=0?'+':''}${(qAct-qCmp).toFixed(0)}k)`:""}</div></div>
      </div>
    </div>

    <div class="card">
      <h2>Headcount Trends
        <span class="muted small" style="font-weight:400">${hcTeam==='__all__'?'BU total':'Filtered to '+esc(hcTeam)}</span>
      </h2>
      ${bu === "Takeaway" ? '' : `<div class="team-filter-row">
        <span class="label">Team filter</span>
        <select class="team-select" id="hc-team-${bu}">${hcTeamOptions}</select>
        <span class="muted small">${hcTeam==='__all__'?'Showing BU totals — pick a team to see its HC trend vs BU '+state.compare:'Comparing team Actual HC to BU '+state.compare+' as reference.'}</span>
      </div>`}
      <div class="grid-2">
        <div><div class="chart-wrap"><canvas id="chart-d-${bu}"></canvas></div></div>
        <div><div class="chart-wrap"><canvas id="chart-s-${bu}"></canvas></div></div>
      </div>
    </div>

    <div class="card">
      <h2>Comp &amp; Benefits Decomposition
        <div class="toggle-btns mini" data-wf="cb">
          <button data-blk="FTE" class="${wfBlk.cb==='FTE'?'active':''}">FTE</button>
          <button data-blk="Quasi" class="${wfBlk.cb==='Quasi'?'active':''}">Quasi</button>
          <button data-blk="Total" class="${wfBlk.cb==='Total'?'active':''}">Total</button>
        </div>
      </h2>
      <div class="subsection-head"><h3>Price/Volume waterfall</h3><span class="meta" id="meta-cb-${bu}"></span></div>
      <div id="wf-cb-${bu}"></div>
      <div class="commentary"><h3>Commentary</h3><div id="cmt-cb-${bu}"></div></div>
    </div>

    <div class="card">
      <h2>Other Labor Exp Decomposition
        <div class="toggle-btns mini" data-wf="ole">
          <button data-blk="FTE" class="${wfBlk.ole==='FTE'?'active':''}">FTE</button>
          <button data-blk="Quasi" class="${wfBlk.ole==='Quasi'?'active':''}">Quasi</button>
          <button data-blk="Total" class="${wfBlk.ole==='Total'?'active':''}">Total</button>
        </div>
      </h2>
      <div class="subsection-head"><h3>Price/Volume waterfall</h3><span class="meta" id="meta-ole-${bu}"></span></div>
      <div id="wf-ole-${bu}"></div>
      <div class="commentary"><h3>Commentary</h3><div id="cmt-ole-${bu}"></div></div>
    </div>

    <div class="card">
      <h2>Full Variance Analysis
        <div class="toggle-btns mini" data-tbl="view">
          <button data-view="FBR" class="${tblView==='FBR'?'active':''}">FBR</button>
          <button data-view="DOLLAR" class="${tblView==='DOLLAR'?'active':''}">$ Absolute</button>
        </div>
      </h2>
      <div class="split-block" style="margin-bottom:0">
        <div><h3>FTE</h3><div id="tbl-fte-${bu}"></div></div>
        <div><h3>Quasi</h3><div id="tbl-q-${bu}"></div></div>
      </div>
    </div>

    <div class="card">
      <div class="questions">
        <h3>Open Questions for HRBPs</h3>
        <ul id="q-${bu}"></ul>
      </div>
    </div>
  `;
  document.getElementById("bu-content").innerHTML = html;

  // Render HC charts
  renderHCChart(document.getElementById(`chart-d-${bu}`), bu, "D Levels");
  renderHCChart(document.getElementById(`chart-s-${bu}`), bu, "Subsidiary HC");

  // Render waterfalls + commentary
  renderWaterfallsAndCommentary(bu, period);

  // Render variance tables (FTE | Quasi side-by-side, sourced from SSL Excel)
  renderVarianceTable(document.getElementById(`tbl-fte-${bu}`), bu, "FTE", period, tblView);
  renderVarianceTable(document.getElementById(`tbl-q-${bu}`), bu, "Quasi", period, tblView);

  // Questions
  const qs = generateQuestions(bu, period);
  document.getElementById(`q-${bu}`).innerHTML = qs.length ? qs.map(q=>`<li>${q}</li>`).join("") : "<li>No significant unexplained variances at the configured threshold.</li>";

  // Bind in-page toggles
  document.querySelectorAll(`[data-wf]`).forEach(group => {
    const wfKey = group.dataset.wf;
    group.querySelectorAll("button").forEach(b => {
      b.addEventListener("click", () => {
        group.querySelectorAll("button").forEach(x=>x.classList.remove("active")); b.classList.add("active");
        state.wfBlock[wfKey] = b.dataset.blk;
        renderWaterfallsAndCommentary(bu, period);
      });
    });
  });
  document.querySelectorAll(`[data-tbl="view"] button`).forEach(b => {
    b.addEventListener("click", () => {
      document.querySelectorAll(`[data-tbl="view"] button`).forEach(x=>x.classList.remove("active")); b.classList.add("active");
      state.tableView[bu] = b.dataset.view;
      renderBU();
    });
  });
  // HC team filter
  const hcSelect = document.getElementById(`hc-team-${bu}`);
  if (hcSelect) hcSelect.addEventListener("change", e => { state.hcTeam[bu] = e.target.value; renderBU(); });
}

function renderWaterfallsAndCommentary(bu, period) {
  const cbBlock = state.wfBlock.cb, oleBlock = state.wfBlock.ole;
  const cbWF = computeWaterfall(bu, cbBlock, DATA.comp_lines, period, "Comp & Benefits");
  const oleWF = computeWaterfall(bu, oleBlock, DATA.ole_lines, period, "Other Labor Exp");
  function metaText(wf, block) {
    if (block === "Total") return `Total view: FTE D-Levels ${wf.fteHC??'—'} vs ${wf.fteHCcmp??'—'} • Quasi Subsidiary ${wf.qHC??'—'} vs ${wf.qHCcmp??'—'}`;
    const lbl = block==="FTE" ? "D-Levels" : "Subsidiary HC";
    return `${block} view: ${lbl} ${wf.HC_act??'—'} actual vs ${wf.HC_cmp??'—'} ${state.compare}`;
  }
  document.getElementById(`meta-cb-${bu}`).textContent = metaText(cbWF, cbBlock);
  document.getElementById(`meta-ole-${bu}`).textContent = metaText(oleWF, oleBlock);
  setTimeout(()=>{
    renderWaterfall(document.getElementById(`wf-cb-${bu}`), cbWF, "Comp & Benefits");
    renderWaterfall(document.getElementById(`wf-ole-${bu}`), oleWF, "Other Labor Exp");
  }, 30);
  document.getElementById(`cmt-cb-${bu}`).innerHTML = generateCommentary(cbWF, cbBlock);
  document.getElementById(`cmt-ole-${bu}`).innerHTML = generateCommentary(oleWF, oleBlock);
}

// === Global toggles ===
function bindGlobalToggles() {
  document.querySelectorAll("#period-quick button").forEach(b => {
    b.addEventListener("click", () => {
      document.querySelectorAll("#period-quick button").forEach(x=>x.classList.remove("active")); b.classList.add("active");
      document.getElementById("month-select").value = "";
      state.period = b.dataset.val; renderBU();
    });
  });
  document.getElementById("month-select").addEventListener("change", e => {
    if (!e.target.value) return;
    document.querySelectorAll("#period-quick button").forEach(x=>x.classList.remove("active"));
    state.period = e.target.value; renderBU();
  });
  document.querySelectorAll("#compare-toggle button").forEach(b => {
    b.addEventListener("click", () => {
      document.querySelectorAll("#compare-toggle button").forEach(x=>x.classList.remove("active")); b.classList.add("active");
      state.compare = b.dataset.val; renderBU();
    });
  });
  document.querySelectorAll("#bu-tabs button").forEach(b => {
    b.addEventListener("click", () => {
      document.querySelectorAll("#bu-tabs button").forEach(x=>x.classList.remove("active")); b.classList.add("active");
      state.bu = b.dataset.bu; renderBU();
    });
  });
}

window.addEventListener("DOMContentLoaded", () => {
  bindGlobalToggles();
  renderBU();
});
</script>
</body>
</html>
